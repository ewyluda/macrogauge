name: daily
on:
  schedule:
    - cron: "40 12 * * 1-5" # 8:40 ET during EDT
    - cron: "40 13 * * 1-5" # 8:40 ET during EST
    # Backup firing in case GitHub drops both morning crons (observed slips of
    # 2.5-3h on 2026-07-08/09); lands 13:40 EDT / 12:40 EST, gate dedupes.
    - cron: "40 17 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50
      - name: Gate — scheduled runs publish once per day, 8:40-15:59 ET
        id: gate
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Window must out-span GitHub's cron slip (2.5-3h observed; both
          # 2026-07-09 firings landed past a 10:59 cutoff and no-op'd, so the
          # site went a day stale). Floor of 8 still excludes the EST cron's
          # 7:40 ET firing during EDT. The already-published grep below is
          # what prevents double publishes, not this window.
          H=$(TZ=America/New_York date +%-H)
          TODAY=$(TZ=America/New_York date +%Y-%m-%d)
          if [ "$H" -lt 8 ] || [ "$H" -gt 15 ]; then
            echo "outside ET window (hour $H) — pre-window DST cron or a slip past 15:59"
            echo "run=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if git log --oneline --grep "^data: daily publish $TODAY" | grep -q .; then
            echo "already published today"
            echo "run=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "run=true" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-python@v5
        if: steps.gate.outputs.run == 'true'
        with:
          python-version: "3.12"
      - name: Run pipeline
        if: steps.gate.outputs.run == 'true'
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          USDA_API_KEY: ${{ secrets.USDA_API_KEY }}
        run: |
          pip install -e . -q
          python -m pipeline.run_daily --store store --out site/public/data
      - name: Commit data back
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name "macrogauge-bot"
          # Vercel (Hobby) blocks deploys for commits whose author email doesn't
          # match a GitHub account — use the owner's noreply address.
          git config user.email "35318463+ewyluda@users.noreply.github.com"
          git add store site/public/data
          # published_at advances every run, so a successful run always commits —
          # the daily commit is the loop's heartbeat. The guard is only a safety
          # net for a pipeline step that wrote nothing.
          if git diff --cached --quiet; then
            echo "nothing staged — pipeline wrote no artifacts?"
          else
            git commit -m "data: daily publish $(TZ=America/New_York date '+%Y-%m-%d %H:%M ET')"
            git push
          fi
